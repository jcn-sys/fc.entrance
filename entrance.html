<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <style>
    :root { --bg-default: #f8f9fa; --bg-roadmap: #f1f8e9; --num-bg: #81c784; }
    body { font-family: -apple-system, sans-serif; text-align: center; background: var(--bg-default); padding: 20px 10px; margin:0; }
    .bg-roadmap { background-color: var(--bg-roadmap) !important; background-image: radial-gradient(#dcedc8 2px, transparent 2px) !important; background-size: 25px 25px !important; }
    .header { width: 100%; text-align: center; padding: 15px 0; font-weight: bold; font-size: 22px; color: #333; }
    .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px 10px; width: 100%; max-width: 450px; margin: 0 auto; align-items: start; }
    .item { display: flex; flex-direction: column; align-items: center; }
    .clickable { cursor: pointer; }
    .clickable:active { transform: scale(0.92); }
    .icon-box { 
      width: 80%; aspect-ratio: 1/1; background-color: #fff; 
      background-size: cover; background-position: center; background-repeat: no-repeat;
      border-radius: 22%; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 8px;
      display: flex; align-items: center; justify-content: center;
    }
    .deco-mode { background-color: transparent !important; box-shadow: none !important; border-radius: 0 !important; background-size: contain; animation: sway 2.5s infinite ease-in-out; }
    .num-style { background-color: var(--num-bg) !important; color: white !important; font-size: 24px; font-weight: 900; border-radius: 50% !important; }
    @keyframes sway { 0%, 100% { transform: rotate(-5deg); } 50% { transform: rotate(5deg); } }
    .name { font-size: 11px; font-weight: bold; line-height: 1.3; width: 95%; word-break: break-all; min-height: 2.6em; display: flex; align-items: flex-start; justify-content: center; }
    .modal-body a { color: #0984e3; text-decoration: underline; font-weight: bold; }
    #modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 1000; justify-content: center; align-items: center; }
    #modal-content { background: white; width: 85%; max-width: 320px; padding: 25px; border-radius: 20px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
    .modal-body { font-size: 15px; line-height: 1.6; white-space: pre-wrap; margin-bottom: 20px; text-align: left; }
    .modal-btn-call { display: block; width: 100%; padding: 14px 0; background: #55efc4; color: #008162; text-decoration: none; border-radius: 12px; font-weight: bold; margin-bottom: 12px; border: none; font-size: 16px; cursor: pointer; }
    .modal-btn-close { display: block; width: 100%; padding: 12px 0; background: #eee; color: #666; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; }
    .btn-back { margin-top: 40px; display: inline-block; padding: 12px 40px; background: #fff; border-radius: 25px; text-decoration: none; color: #666; font-weight: bold; box-shadow: 0 4px 0 #ddd; cursor: pointer;}
  </style>
</head>
<body id="bodyTag">
  <h3 id="main-title" class="header">読み込み中...</h3>
  <div id="loading" style="padding:50px; color:#888;">データを取得しています...</div>
  <div id="app" class="grid"></div>

  <div id="modal-overlay" onclick="closeModal()">
    <div id="modal-content" onclick="event.stopPropagation()">
      <div id="modal-body" class="modal-body"></div>
      <button id="modal-call-btn" class="modal-btn-call">電話をかける</button>
      <button class="modal-btn-close" onclick="closeModal()">閉じる</button>
    </div>
  </div>

  <script>
    // --- 設定部分 ---
    const gasUrl = "https://script.google.com/macros/s/AKfycbyXtX5OAweEnYx0W4URXRL1-q24M0zDebGvGwzipT25gUOSQZ7zGpgRXkycXWbSYmkOqg/exec"; 
    // ----------------

    const urlParams = new URLSearchParams(window.location.search);
    const currentPage = urlParams.get('p') || "ホーム";
    
    // 現在のURL（ entrance.html 部分まで）をベースにする
    const baseUrl = window.location.origin + window.location.pathname;
    
    const isRoadmap = currentPage.includes('ロードマップ');
    
    document.getElementById('main-title').innerText = (currentPage === "ホーム") ? "FC Entrance" : currentPage;
    if (isRoadmap) document.getElementById('bodyTag').classList.add('bg-roadmap');
    function closeModal() { document.getElementById('modal-overlay').style.display = 'none'; }

    // データの取得
    fetch(`${gasUrl}?p=${encodeURIComponent(currentPage)}`)
      .then(response => response.json())
      .then(data => {
        document.getElementById('loading').style.display = 'none';
        const app = document.getElementById('app');
        
        data.forEach(item => {
          const div = document.createElement('div');
          div.className = 'item';
          const icon = document.createElement('div');
          icon.className = 'icon-box';
          
          if (item.isNum) {
            icon.classList.add('num-style');
            icon.innerText = item.rawName;
          } else if (item.hasImg) {
            icon.style.backgroundImage = "url('" + item.img + "')";
            if (item.isDeco) icon.classList.add('deco-mode');
          }

          if (!item.isDeco) {
            div.classList.add('clickable');
            div.onclick = () => {
              const content = item.content.trim();
              if (content.startsWith('tel:')) {
                document.getElementById('modal-body').innerHTML = `<b>${item.rawName}</b><br><br>電話をかけますか？`;
                const callBtn = document.getElementById('modal-call-btn');
                callBtn.style.display = 'block';
                callBtn.onclick = () => { window.location.href = content; };
                document.getElementById('modal-overlay').style.display = 'flex';
              } else if (content.startsWith('http') && !content.includes('<a')) {
                window.open(content, '_blank');
              } else if (content !== "") {
                let linkedText = content;
                const urlRegex = /(?<!href="|">)(https?:\/\/[^\s<]+)/g;
                linkedText = linkedText.replace(urlRegex, '<a href="$1" target="_blank">$1</a>');
                document.getElementById('modal-body').innerHTML = linkedText;
                document.getElementById('modal-call-btn').style.display = 'none';
                document.getElementById('modal-overlay').style.display = 'flex';
              } else {
                // 次のページへの遷移（ entrance.html?p=次ページ名 ）
                window.location.href = baseUrl + "?p=" + encodeURIComponent(item.rawName);
              }
            };
            
            const nameDiv = document.createElement('div');
            nameDiv.className = 'name';
            nameDiv.innerHTML = item.name;
            div.appendChild(icon);
            div.appendChild(nameDiv);
          } else {
            div.appendChild(icon);
          }
          app.appendChild(div);
        });

        if (currentPage !== "ホーム") {
          const b = document.createElement('a');
          b.className = 'btn-back'; b.innerText = "戻る";
          b.onclick = () => { window.location.href = baseUrl; };
          document.body.appendChild(b);
        }
      })
      .catch(error => {
        document.getElementById('loading').innerText = "データの取得に失敗しました。";
        console.error('Error:', error);
      });
  </script>
</body>
</html>
